name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run pytest with coverage gate
        run: python -m pytest --cov=budget --cov-fail-under=70

      - name: Check cyclomatic complexity with radon
        run: python -m radon cc -s budget

      - name: Enforce complexity thresholds with xenon
        run: python -m xenon -b B -a B -m B budget

      - name: Run flake8
        run: python -m flake8 budget tests
